<header class="docs-header" role="banner">
  <div class="docs-header__inner container">
    <div class="docs-header__brand">
      <button
        class="docs-header__menu-button"
        type="button"
        aria-expanded="false"
        aria-controls="docs-sidebar"
        data-sidebar-toggle
      >
        <span class="docs-header__menu-icon" aria-hidden="true"></span>
        <span class="screen-reader-text">Toggle navigation</span>
      </button>
      <div class="docs-header__titles">
        <div class="docs-header__title">{{siteTitle}}</div>
        <p class="docs-header__tagline">{{siteTagline}}</p>
      </div>
    </div>
    <div class="docs-header__actions">
      <a class="docs-header__skip-link" href="#main-content">Skip to content</a>
      <button
        class="docs-header__theme-toggle"
        type="button"
        data-theme-toggle
        aria-label="Toggle dark mode"
      >
        <svg
          class="docs-header__theme-icon docs-header__theme-icon--moon"
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg
          class="docs-header__theme-icon docs-header__theme-icon--sun"
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </div>
</header>
