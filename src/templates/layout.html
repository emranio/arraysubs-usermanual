<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{documentTitle}}</title>
    <meta name="description" content="{{description}}" />
    <meta name="generator" content="ArraySubs Docs Generator" />
    <meta name="theme-color" content="#f8fafc" />
    <meta property="og:title" content="{{documentTitle}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:type" content="{{ogType}}" />
    <meta property="og:url" content="{{pageUrl}}" />
    <meta property="og:image" content="{{ogImageUrl}}" />
    <meta name="twitter:card" content="{{twitterCard}}" />
    <meta name="twitter:title" content="{{documentTitle}}" />
    <meta name="twitter:description" content="{{description}}" />
    <meta name="twitter:image" content="{{ogImageUrl}}" />
    <link rel="canonical" href="{{canonicalUrl}}" />
    <link rel="icon" href="{{faviconHref}}" type="image/svg+xml" />
    <link
      rel="preload"
      href="{{bodyFontHref}}"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="{{headingFontHref}}"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="{{styleHref}}" />
    {{gtmScript}}
    <script>
      (function () {
        var t = localStorage.getItem("docs-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme:dark)").matches)
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.content = "#0b0e14";
        }
      })();
    </script>
  </head>
  <body class="{{bodyClass}}">
    {{header}}
    <div class="docs-shell container">
      <aside
        class="docs-shell__sidebar docs-sidebar"
        id="docs-sidebar"
        aria-label="Sidebar"
      >
        {{sidebar}}
      </aside>
      <button
        class="docs-shell__overlay"
        type="button"
        hidden
        aria-label="Close navigation"
        data-sidebar-overlay
      ></button>
      <main class="docs-shell__main" id="main-content">
        {{breadcrumb}}
        <article class="docs-article" aria-labelledby="page-title">
          <header class="docs-page-header">
            <div class="docs-page-header__title-row">
              <h1 class="docs-page-header__title" id="page-title">
                {{pageTitle}}
              </h1>
              {{pageBadge}}
            </div>
          </header>
          <div class="docs-content">{{contentHtml}}</div>
          {{footer}}
        </article>
      </main>
      <aside class="docs-shell__toc docs-toc-panel" aria-label="On this page">
        {{toc}}
      </aside>
    </div>
    <script src="{{scriptHref}}" defer></script>
    <script type="module">
      import mermaid from "{{mermaidHref}}";

      function getCssVar(name, fallback) {
        var value = getComputedStyle(document.documentElement)
          .getPropertyValue(name)
          .trim();

        return value || fallback;
      }

      function getMermaidOptions(theme) {
        var isDark = theme === "dark";
        var surface = getCssVar(
          "--docs-surface",
          isDark ? "#13171f" : "#ffffff",
        );
        var surfaceMuted = getCssVar(
          "--docs-surface-muted",
          isDark ? "#1a1f2b" : "#f1f5f9",
        );
        var accent = getCssVar("--docs-primary", "#c2410c");
        var accentSoft = getCssVar(
          "--docs-primary-soft",
          isDark ? "rgba(194, 65, 12, 0.14)" : "#fff1e8",
        );

        return {
          startOnLoad: false,
          theme: "base",
          darkMode: isDark,
          fontFamily: getCssVar(
            "--docs-font",
            '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          ),
          themeVariables: {
            background: surface,
            mainBkg: surface,
            secondBkg: surfaceMuted,
            primaryColor: accent,
            primaryBorderColor: accent,
            primaryTextColor: "#ffffff",
            lineColor: getCssVar(
              "--docs-text-muted",
              isDark ? "#94a3b8" : "#526377",
            ),
            textColor: getCssVar("--docs-text", isDark ? "#e2e8f0" : "#0f172a"),
            tertiaryColor: accentSoft,
            clusterBkg: accentSoft,
            clusterBorder: accent,
            noteBkgColor: accentSoft,
            noteTextColor: getCssVar(
              "--docs-text",
              isDark ? "#e2e8f0" : "#0f172a",
            ),
            edgeLabelBackground: surface,
            fontFamily: getCssVar(
              "--docs-font",
              '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
            ),
          },
        };
      }

      function rerenderMermaid() {
        document.querySelectorAll("pre.mermaid").forEach(function (el) {
          var raw = el.getAttribute("data-mermaid-src");

          if (raw) {
            el.removeAttribute("data-processed");
            el.innerHTML = raw;
          }
        });

        mermaid.run({ querySelector: "pre.mermaid" });
      }

      var initialTheme =
        document.documentElement.getAttribute("data-theme") === "dark"
          ? "dark"
          : "light";

      document.querySelectorAll("pre.mermaid").forEach(function (el) {
        el.setAttribute("data-mermaid-src", el.textContent);
      });

      mermaid.initialize(getMermaidOptions(initialTheme));
      rerenderMermaid();

      document.addEventListener("docs-theme-changed", function (e) {
        mermaid.initialize(
          getMermaidOptions(e.detail === "dark" ? "dark" : "light"),
        );
        rerenderMermaid();
      });
    </script>
  </body>
</html>
