<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{documentTitle}}</title>
    <meta name="description" content="{{description}}" />
    <meta name="generator" content="ArraySubs Docs Generator" />
    <meta name="theme-color" content="#f8fafc" />
    <meta property="og:title" content="{{documentTitle}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:type" content="{{ogType}}" />
    <meta property="og:url" content="{{pageUrl}}" />
    <meta property="og:image" content="{{ogImageUrl}}" />
    <meta name="twitter:card" content="{{twitterCard}}" />
    <meta name="twitter:title" content="{{documentTitle}}" />
    <meta name="twitter:description" content="{{description}}" />
    <meta name="twitter:image" content="{{ogImageUrl}}" />
    <link rel="canonical" href="{{canonicalUrl}}" />
    <link rel="icon" href="{{faviconHref}}" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap"
    />
    <link rel="stylesheet" href="{{styleHref}}" />
    <script>(function(){var t=localStorage.getItem('docs-theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark');var m=document.querySelector('meta[name="theme-color"]');if(m)m.content='#0b0e14'}})()</script>
  </head>
  <body class="{{bodyClass}}">
    {{header}}
    <div class="docs-shell container">
      <aside class="docs-shell__sidebar docs-sidebar" aria-label="Sidebar">
        {{sidebar}}
      </aside>
      <button
        class="docs-shell__overlay"
        type="button"
        hidden
        aria-label="Close navigation"
        data-sidebar-overlay
      ></button>
      <main class="docs-shell__main" id="main-content">
        {{breadcrumb}}
        <article class="docs-article" aria-labelledby="page-title">
          <header class="docs-page-header">
            <div class="docs-page-header__title-row">
              <h1 class="docs-page-header__title" id="page-title">
                {{pageTitle}}
              </h1>
              {{pageBadge}}
            </div>
          </header>
          <div class="docs-content">{{contentHtml}}</div>
          {{footer}}
        </article>
      </main>
      <aside class="docs-shell__toc docs-toc-panel" aria-label="On this page">{{toc}}</aside>
    <script src="{{scriptHref}}" defer></script>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      mermaid.initialize({ startOnLoad: true, theme: isDark ? 'dark' : 'default' });
      document.addEventListener('docs-theme-changed', function (e) {
        mermaid.initialize({ startOnLoad: false, theme: e.detail === 'dark' ? 'dark' : 'default' });
        document.querySelectorAll('pre.mermaid').forEach(function (el) {
          var raw = el.getAttribute('data-mermaid-src');
          if (raw) { el.removeAttribute('data-processed'); el.innerHTML = raw; }
        });
        mermaid.run();
      });
      document.querySelectorAll('pre.mermaid').forEach(function (el) {
        el.setAttribute('data-mermaid-src', el.textContent);
      });
    </script>
  </body>
</html>
